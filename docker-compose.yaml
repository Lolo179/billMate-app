# ============================================================
# BillMate — Despliegue EC2 (t2.small / t3.small)
# Servicios esenciales: postgres, gateway, auth, billing, frontend
# ============================================================
# Uso rápido (primera vez, construye las imágenes):
#   docker compose up -d --build
#
# Con imágenes ya publicadas en GHCR:
#   docker compose pull && docker compose up -d
#
# Parar todo:
#   docker compose down
#
# Parar y borrar volúmenes (cuidado: elimina datos):
#   docker compose down -v
#
# Puertos públicos:
#   8083 → Frontend (acceso de usuarios)
#   8080 → API Gateway (acceso directo, Postman, etc.)
# ============================================================

services:

  # ══════════════════════════════
  # INFRAESTRUCTURA
  # ══════════════════════════════

  postgres-auth:
    image: postgres:16
    container_name: billmate-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - billmate-net
    restart: unless-stopped

  postgres-billing:
    image: postgres:16
    container_name: billmate-postgres-billing
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-billing-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - billmate-net
    restart: unless-stopped

  # ══════════════════════════════
  # MICROSERVICIOS
  # ══════════════════════════════

  auth-service:
    build: ./auth-service
    image: ghcr.io/lolo179/auth-service:latest
    container_name: billmate-auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:-gJ1yu5QC/hlLhx9d0tqZxIHH8vioFhmv9XCkUdDAX1Y=}
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - billmate-net
    restart: unless-stopped

  billing-service:
    build: ./billing-service
    image: ghcr.io/lolo179/billing-service:latest
    container_name: billmate-billing-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-billing:5432/billing_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Kafka deshabilitado en EC2 small — la publicación de eventos falla silenciosamente
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ""
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    depends_on:
      postgres-billing:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - billmate-net
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    image: ghcr.io/lolo179/api-gateway:latest
    container_name: billmate-api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      BILLING_SERVICE_URI: http://billing-service:8082
      JWT_SECRET: ${JWT_SECRET:-gJ1yu5QC/hlLhx9d0tqZxIHH8vioFhmv9XCkUdDAX1Y=}
    depends_on:
      auth-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    networks:
      - billmate-net
    restart: unless-stopped

  frontend-service:
    build:
      context: ./frontend-service
      args:
        # VITE_API_BASE_URL vacío → URLs relativas → nginx las proxea al gateway
        VITE_API_BASE_URL: ""
        VITE_USE_MSW: "false"
    image: ghcr.io/lolo179/frontend-service:latest
    container_name: billmate-frontend-service
    ports:
      - "8083:8083"
    depends_on:
      - api-gateway
    networks:
      - billmate-net
    restart: unless-stopped

# ══════════════════════════════
# REDES
# ══════════════════════════════

networks:
  billmate-net:
    driver: bridge

# ══════════════════════════════
# VOLÚMENES
# ══════════════════════════════

volumes:
  postgres-auth-data:
  postgres-billing-data:
