spring:
  docker:
    compose:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create

  flyway:
    enabled: false

  sql:
    init:
      mode: never

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

billmate:
  kafka:
    enabled: false