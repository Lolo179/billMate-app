services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  billing-db:
    image: postgres:16
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    environment:
      AUTH_SERVICE_URI: http://host.docker.internal:8081
      BILLING_SERVICE_URI: http://host.docker.internal:8082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  frontend-service:
    build:
      context: ../frontend-service
      dockerfile: Dockerfile
      args:
        VITE_USE_MSW: "false"
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:8083"
