name: E2E CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - "api-gateway/**"
      - "auth-service/**"
      - "billing-service/**"
      - "frontend-service/**"
      - "e2e/**"
      - ".github/workflows/e2e-ci.yaml"
  workflow_dispatch:

concurrency:
  group: e2e-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-environment-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend-service/package-lock.json
            e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start full environment with Docker Compose
        run: |
          mkdir -p .tmp
          docker compose -f e2e/docker-compose.ci.yaml up -d --build

      - name: Wait for environment
        run: |
          wait_for() {
            local url="$1"
            local name="$2"
            for attempt in $(seq 1 60); do
              if curl --fail --silent "$url" > /dev/null; then
                echo "$name is ready"
                return 0
              fi
              sleep 2
            done
            echo "$name did not start in time"
            return 1
          }

          wait_for "http://127.0.0.1:8081/actuator/health" "auth-service"
          wait_for "http://127.0.0.1:8082/actuator/health" "billing-service"
          wait_for "http://127.0.0.1:8080/actuator/health" "api-gateway"
          wait_for "http://127.0.0.1:5173/login" "frontend-service"

      - name: Run Playwright E2E
        working-directory: e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
        run: npm test

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            .tmp/*.log
            e2e/playwright-report
            e2e/test-results
          retention-days: 7

      - name: Capture Docker Compose logs
        if: always()
        run: docker compose -f e2e/docker-compose.ci.yaml logs --no-color > .tmp/docker-compose.log

      - name: Upload Docker Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docker-logs
          path: .tmp/docker-compose.log
          retention-days: 7

      - name: Stop full environment
        if: always()
        run: docker compose -f e2e/docker-compose.ci.yaml down -v --remove-orphans
