name: Frontend CD

on:
  push:
    tags:
      - "frontend-v*.*.*"

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  frontend-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-service
          file: ./frontend-service/Dockerfile
          push: false
          load: false
          tags: billmate/frontend-service:cd-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-release:
    needs: frontend-build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/frontend-v}" >> $GITHUB_OUTPUT

      - name: Lowercase owner
        id: owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-service
          file: ./frontend-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.OWNER }}/frontend-service:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.owner.outputs.OWNER }}/frontend-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
