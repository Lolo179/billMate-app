name: Deploy

on:
  # Se activa cuando CI completa con éxito en main (build+push+E2E)
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]
  # Permite lanzar un deploy manual desde Actions
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false   # nunca cancelar un deploy en curso

permissions:
  contents: read

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # Desplegar en EC2
  # Las imágenes ya están en GHCR publicadas por ci.yaml (build-and-push)
  # ══════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # En workflow_run: solo desplegar si CI pasó completamente
    # En workflow_dispatch: siempre ejecutar
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Preparar clave SSH ──────────────────────────────────────────────
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # ── Copiar docker-compose.yaml actualizado ──────────────────────────
      - name: Upload docker-compose.yaml
        run: |
          scp -i ~/.ssh/ec2.pem \
            docker-compose.yaml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/billMate-app/docker-compose.yaml

      # ── Escribir .env en la instancia (desde secret) ───────────────────
      - name: Write .env file on EC2
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "echo '${{ secrets.EC2_ENV }}' > ~/billMate-app/.env && chmod 600 ~/billMate-app/.env"

      # ── Instalar Docker Compose V2 en EC2 (binario directo) ─────────────
      - name: Install Docker Compose V2 on EC2
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /usr/local/lib/docker/cli-plugins && \
             sudo curl -fsSL https://github.com/docker/compose/releases/download/v2.24.7/docker-compose-linux-x86_64 \
               -o /usr/local/lib/docker/cli-plugins/docker-compose && \
             sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose"

      # ── Ejecutar deploy ─────────────────────────────────────────────────
      - name: Run deploy
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/billMate-app
            echo "Pulling latest images..."
            docker compose pull
            echo "Recreating containers..."
            docker compose up -d --force-recreate
            echo "Cleaning old images..."
            docker image prune -f
          ENDSSH

      # ── Health check post-deploy ────────────────────────────────────────
      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            # Para contenedores con Docker healthcheck (auth y billing)
            wait_healthy() {
              local name=$1
              local container=$2
              echo "Waiting for $name..."
              for i in $(seq 1 36); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo "unknown")
                if [ "$STATUS" = "healthy" ]; then
                  echo "OK $name (healthy)"
                  return 0
                fi
                echo "  [$i/36] $name: $STATUS — retrying in 5s..."
                sleep 5
              done
              echo "FAIL $name did not become healthy after 3 minutes"
              exit 1
            }

            # Para contenedores sin Docker healthcheck (gateway y frontend)
            wait_http() {
              local name=$1
              local url=$2
              echo "Waiting for $name..."
              for i in $(seq 1 24); do
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
                if [ "$STATUS" = "200" ]; then
                  echo "OK $name ($STATUS)"
                  return 0
                fi
                echo "  [$i/24] $name: HTTP $STATUS — retrying in 5s..."
                sleep 5
              done
              echo "FAIL $name did not respond after 2 minutes"
              exit 1
            }

            wait_healthy "auth-service"    "billmate-auth-service"
            wait_healthy "billing-service" "billmate-billing-service"
            wait_http    "api-gateway"     "http://localhost:8080/actuator/health"
            wait_http    "frontend"        "http://localhost:8083"
          EOF
