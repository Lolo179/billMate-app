name: Auth CI

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: auth-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auth-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B -ntp clean verify -Dspring.test.context.cache.maxSize=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: false
          load: false
          tags: billmate/auth-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
