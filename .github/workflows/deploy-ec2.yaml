name: Deploy to EC2

on:
  push:
    branches: [ main ]
    paths:
      - "docker-compose.yaml"
      - ".env.example"
      - ".github/workflows/deploy-ec2.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false   # nunca cancelar un deploy en curso

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2 (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # в”Ђв”Ђ Preparar clave SSH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # в”Ђв”Ђ Copiar docker-compose.yaml actualizado в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload docker-compose.yaml
        run: |
          scp -i ~/.ssh/ec2.pem \
            docker-compose.yaml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/billMate-app/docker-compose.yaml

      # в”Ђв”Ђ Escribir .env en la instancia (desde secret) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Write .env file on EC2
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "echo '${{ secrets.EC2_ENV }}' > ~/billMate-app/.env && chmod 600 ~/billMate-app/.env"

      # в”Ђв”Ђ Ejecutar deploy.sh в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash ~/billMate-app/deploy.sh"

      # в”Ђв”Ђ Health check post-deploy в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            # Para contenedores con Docker healthcheck (auth y billing)
            wait_healthy() {
              local name=$1
              local container=$2
              echo "Waiting for $name..."
              for i in $(seq 1 36); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo "unknown")
                if [ "$STATUS" = "healthy" ]; then
                  echo "OK $name (healthy)"
                  return 0
                fi
                echo "  [$i/36] $name: $STATUS вЂ” retrying in 5s..."
                sleep 5
              done
              echo "FAIL $name did not become healthy after 3 minutes"
              exit 1
            }

            # Para contenedores sin Docker healthcheck (gateway y frontend)
            wait_http() {
              local name=$1
              local url=$2
              echo "Waiting for $name..."
              for i in $(seq 1 24); do
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
                if [ "$STATUS" = "200" ]; then
                  echo "OK $name ($STATUS)"
                  return 0
                fi
                echo "  [$i/24] $name: HTTP $STATUS вЂ” retrying in 5s..."
                sleep 5
              done
              echo "FAIL $name did not respond after 2 minutes"
              exit 1
            }

            wait_healthy "auth-service"    "billmate-auth-service"
            wait_healthy "billing-service" "billmate-billing-service"
            wait_http    "api-gateway"     "http://localhost:8080/actuator/health"
            wait_http    "frontend"        "http://localhost:8083"
          EOF