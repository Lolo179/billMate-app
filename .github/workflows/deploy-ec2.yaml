name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false   # nunca cancelar un deploy en curso

permissions:
  contents: read
  packages: write

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # JOB 1 — Compilar y publicar imágenes en GHCR
  # ══════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.OWNER }}/auth-service:latest
          cache-from: type=gha,scope=auth
          cache-to: type=gha,scope=auth,mode=max

      - name: Build & push billing-service
        uses: docker/build-push-action@v6
        with:
          context: ./billing-service
          file: ./billing-service/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.OWNER }}/billing-service:latest
          cache-from: type=gha,scope=billing
          cache-to: type=gha,scope=billing,mode=max

      - name: Build & push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.OWNER }}/api-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

      - name: Build & push frontend-service
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-service
          file: ./frontend-service/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.OWNER }}/frontend-service:latest
          build-args: |
            VITE_API_BASE_URL=
            VITE_USE_MSW=false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2 — Desplegar en EC2
  # ══════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2 (Ubuntu)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Preparar clave SSH ──────────────────────────────────────────────
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # ── Copiar docker-compose.yaml actualizado ──────────────────────────
      - name: Upload docker-compose.yaml
        run: |
          scp -i ~/.ssh/ec2.pem \
            docker-compose.yaml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/billMate-app/docker-compose.yaml

      # ── Escribir .env en la instancia (desde secret) ───────────────────
      - name: Write .env file on EC2
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "echo '${{ secrets.EC2_ENV }}' > ~/billMate-app/.env && chmod 600 ~/billMate-app/.env"

      # ── Ejecutar deploy ─────────────────────────────────────────────────
      - name: Run deploy
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/billMate-app
            echo "Pulling latest images..."
            docker-compose pull
            echo "Recreating containers..."
            docker-compose up -d --force-recreate
            echo "Cleaning old images..."
            docker image prune -f
          ENDSSH

      # ── Health check post-deploy ────────────────────────────────────────
      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            # Para contenedores con Docker healthcheck (auth y billing)
            wait_healthy() {
              local name=$1
              local container=$2
              echo "Waiting for $name..."
              for i in $(seq 1 36); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo "unknown")
                if [ "$STATUS" = "healthy" ]; then
                  echo "OK $name (healthy)"
                  return 0
                fi
                echo "  [$i/36] $name: $STATUS — retrying in 5s..."
                sleep 5
              done
              echo "FAIL $name did not become healthy after 3 minutes"
              exit 1
            }

            # Para contenedores sin Docker healthcheck (gateway y frontend)
            wait_http() {
              local name=$1
              local url=$2
              echo "Waiting for $name..."
              for i in $(seq 1 24); do
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
                if [ "$STATUS" = "200" ]; then
                  echo "OK $name ($STATUS)"
                  return 0
                fi
                echo "  [$i/24] $name: HTTP $STATUS — retrying in 5s..."
                sleep 5
              done
              echo "FAIL $name did not respond after 2 minutes"
              exit 1
            }

            wait_healthy "auth-service"    "billmate-auth-service"
            wait_healthy "billing-service" "billmate-billing-service"
            wait_http    "api-gateway"     "http://localhost:8080/actuator/health"
            wait_http    "frontend"        "http://localhost:8083"
          EOF